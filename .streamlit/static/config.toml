[client]
showSidebarNavigation = false
toolbarMode = "minimal"

[server]
# Megabytes; raise for large quote PDFs / attachments
maxUploadSize = 200
enableXsrfProtection = true
enableStaticServing = true

[browser]
gatherUsageStats = false

[theme]
# Force consistent IPS dark theme across devices (avoid inheriting local Streamlit theme)
base = "dark"
primaryColor = "#ff5a5f"
backgroundColor = "#031633"
secondaryBackgroundColor = "#0b2247"
textColor = "#f3f6fb"
