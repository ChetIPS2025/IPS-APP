[client]
showSidebarNavigation = false
toolbarMode = "minimal"

[server]
# Megabytes; raise for large quote PDFs / attachments
maxUploadSize = 200
enableXsrfProtection = true
enableStaticServing = true

[browser]
gatherUsageStats = false

[theme]
# Light field theme — aligns with ips_app_shell (grey chrome, dark text, blue primary)
base = "light"
primaryColor = "#2563eb"
backgroundColor = "#d1d5db"
secondaryBackgroundColor = "#cbd5e1"
textColor = "#111827"
