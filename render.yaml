services:
  - type: web
    name: ips-app
    runtime: python
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: python run_app.py
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHON_VERSION
        value: "3.12.11"
      # Inventory QR deep links: {APP_BASE_URL}/?page=Scan%20Inventory&code=INV-…
      - key: APP_BASE_URL
        value: https://ips-app-ajy0.onrender.com